<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AK Collection Products</title>

<style>
body {
    margin:0;
    font-family:Arial,sans-serif;
    background:#fff;
    color:#111;
}

header {
    background:#000;
    color:#d4af37;
    text-align:center;
    padding:20px;
}

.container {
    padding:20px;
}

.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    overflow:hidden;
    text-align:center;
    padding-bottom:20px;
}

.card img {
    width:100%;
    height:350px;
    object-fit:contain;
}

.order {
    display:inline-block;
    background:#25D366;
    color:white;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>AK Collection</h1>
<p>Quality | Style | Trust</p>
</header>


<div class="container">

<h2>Our Products</h2>

<div class="products" id="products">
Loading products...
</div>

</div>


<script>

const username = "aishakashif996";
const repo = "AKcollection";
const folder = "products";

const whatsapp = "YOUR_WHATSAPP_NUMBER";


fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`)
.then(response => response.json())
.then(files => {

let container = document.getElementById("products");

container.innerHTML="";

files.forEach(file => {

if(file.type === "file" && 
(file.name.endsWith(".jpg") ||
file.name.endsWith(".png") ||
file.name.endsWith(".webp"))) {


container.innerHTML += `

<div class="card">

<img src="${file.download_url}" alt="AK Collection Product">

<br><br>

<a class="order"
href="https://wa.me/${whatsapp}?text=I%20want%20to%20order%20this%20product">
Order on WhatsApp
</a>

</div>

`;

}

});

});

</script>

</body>
</html>
